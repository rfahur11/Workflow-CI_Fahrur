name: Retraining and Dockerize

on:
  push:
    branches:
      - main
    paths:
      - "MLProject/**"
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      - name: Install MLflow & Virtualenv
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 virtualenv

      - name: Run MLflow Project (Retraining)
        run: |
          # Membangunkan/mengaktifkan Conda bawaan Ubuntu Runner
          source /usr/share/miniconda/etc/profile.d/conda.sh

          cd MLProject
          mlflow run .

      - name: Upload Artifact to GitHub (Syarat Advance)
        uses: actions/upload-artifact@v4
        with:
          name: trained-model-artifact
          path: MLProject/model_dir/

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and Push Docker Image (Syarat Advance)
        run: |
          cd MLProject

          DOCKER_USER=$(echo "${{ secrets.DOCKERHUB_USERNAME }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="$DOCKER_USER/telco-model:latest"

          echo "2. Mengekstrak blueprint Docker dari MLflow..."
          mlflow models generate-dockerfile -m model_dir -d my_docker_build --env-manager virtualenv

          echo "3. Mengalihkan server Ubuntu ke jaringan internal Azure..."
          sed -i 's/archive.ubuntu.com/azure.archive.ubuntu.com/g' my_docker_build/Dockerfile
          sed -i 's/security.ubuntu.com/azure.archive.ubuntu.com/g' my_docker_build/Dockerfile

          echo "4. Membangun Docker image: $IMAGE_NAME"
          cd my_docker_build
          docker build -t $IMAGE_NAME .

          echo "5. Mengirim image ke Docker Hub..."
          docker push $IMAGE_NAME
