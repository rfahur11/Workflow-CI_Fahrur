name: Retraining and Dockerize

on:
  push:
    branches:
      - main
    paths:
      - 'MLProject/**'
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Install MLflow & Virtualenv
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 virtualenv

      - name: Run MLflow Project (Retraining)
        run: |
          cd MLProject
          mlflow run . 

      - name: Upload Artifact to GitHub (Syarat Advance)
        uses: actions/upload-artifact@v4
        with:
          name: trained-model-artifact
          path: MLProject/model_dir/

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image (Syarat Advance)
        run: |
          cd MLProject
          # Membungkus model MLflow menjadi Docker Image
          mlflow models build-docker -m model_dir -n ${{ secrets.DOCKERHUB_USERNAME }}/telco-model:latest
          
          # Mengirim image ke Docker Hub
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/telco-model:latest